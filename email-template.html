<!--
  Room Split — EmailJS template
  ─────────────────────────────
  Paste this whole block into EmailJS → Email Templates → (your template) →
  "Edit Content" → switch the editor to Code / HTML view, then paste.

  In the template settings, set:
    • To email    →  {{to_email}}
    • From name   →  Room Split
    • Subject     →  {{email_title}} · {{room_name}}
    • Reply-To    →  (your admin Gmail, optional)

  Variables used: {{to_name}} {{room_name}} {{admin_name}}
                  {{email_title}} {{email_message}} {{amount}}
-->
<div style="margin:0;padding:24px 12px;background:#0E0B1E;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;margin:0 auto;">
    <tr><td style="background:linear-gradient(120deg,#5B4FE9 0%,#D8478B 55%,#E08A00 100%);border-radius:20px 20px 0 0;padding:28px 30px;">
      <div style="font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.85);">Room Split</div>
      <div style="font-size:23px;font-weight:800;color:#ffffff;margin-top:6px;line-height:1.2;">{{email_title}}</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.85);margin-top:4px;">{{room_name}}</div>
    </td></tr>
    <tr><td style="background:#17132E;padding:30px;">
      <p style="font-size:15px;color:#F3F1FB;margin:0 0 16px;">Hi {{to_name}},</p>
      <p style="font-size:14.5px;line-height:1.65;color:#C9C4E4;margin:0 0 22px;">{{email_message}}</p>
      <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 22px;">
        <tr><td style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:16px 22px;">
          <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#9C95C9;">Amount</div>
          <div style="font-size:26px;font-weight:800;color:#ffffff;margin-top:2px;font-family:ui-monospace,Menlo,monospace;">{{amount}}</div>
        </td></tr>
      </table>
      <p style="font-size:13px;line-height:1.6;color:#9C95C9;margin:0;">Sent by <strong style="color:#C9C4E4;">{{admin_name}}</strong> (room admin) via Room Split. Please open the app to settle up.</p>
    </td></tr>
    <tr><td style="background:#120F24;border-radius:0 0 20px 20px;padding:18px 30px;text-align:center;">
      <div style="font-size:11.5px;color:#6E6890;">You're receiving this because you're a member of {{room_name}} on Room Split.</div>
    </td></tr>
  </table>
</div>
